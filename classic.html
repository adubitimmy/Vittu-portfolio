<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samuel Vittu | Interactive Studio</title>
  <meta name="description" content="Interactive drawing studio of Samuel Vittu, contemporary painter. Click and drag to paint on the virtual canvas.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@300;400;600&family=Caveat+Brush&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/classic.css">
</head>
<body>
  <!-- Fullscreen Navigation Menu Overlay -->
  <div id="gallery-full-menu" class="fullscreen-menu">
    <button class="close-menu-btn" id="close-gallery-menu">&times;</button>
    <nav class="menu-nav">
      <a href="/" class="menu-link">Gallery Home</a>
      <a href="/classic.html" class="menu-link active">Interactive Studio</a>
      <a href="/works.html" class="menu-link">Exhibitions</a>
      <a href="#" class="menu-link">Biography</a>
      <a href="#" class="menu-link">Contact</a>
    </nav>
  </div>

  <!-- Main Website Container -->
  <div class="site-container">
    
    <!-- Matched Gallery Navigation Header -->
    <header class="gallery-header">
      <div class="gallery-logo">Samuel Vittu</div>
      <nav class="gallery-nav">
        <a href="/" class="nav-link-btn highlight-link">Virtual Gallery</a>
        <button class="nav-menu-btn" id="gallery-menu-trigger">
          <span>Menu</span>
          <div class="menu-dot"></div>
        </button>
      </nav>
    </header>

    <!-- Background Image and Frost Blur Wrapper -->
    <div class="hero-info-wrapper">

      <!-- Studio Workspace Section -->
      <section class="studio-workspace">
        
        <!-- Canvas Toolbar (Sits directly above the clipboard) -->
        <div class="canvas-control-bar">
          <div class="canvas-controls-left">
            <button class="ctrl-btn" id="undo-btn" title="Undo Last Stroke">Undo</button>
            <button class="ctrl-btn" id="clear-btn" title="Clear Painting">Clear</button>
          </div>
          <div class="canvas-controls-right">
            <!-- Dynamic Brush Size control slider -->
            <div class="brush-size-control">
              <label for="brush-size">Size</label>
              <input type="range" id="brush-size" min="2" max="50" value="8" step="1">
              <span id="brush-size-val" class="brush-size-val">8px</span>
            </div>
            <button class="ctrl-btn highlight-ctrl-btn" id="save-btn" title="Save Artwork as PNG">Save Painting</button>
          </div>
        </div>

        <!-- Centerpiece: Large Clipboard and Interactive Drawing Canvas -->
        <div class="clipboard-container">
          <!-- Clipboard Base wood structure -->
          <img src="/assets/img08.png" class="clipboard-base" alt="Artist Drawing Board">
          
          <!-- Drawing Paper sheet on clipboard -->
          <div class="canvas-paper">
            <canvas id="paint-canvas"></canvas>
            <div class="canvas-instructions">Click & drag to paint</div>
          </div>
        </div>

      </section>

      <!-- Bottom Tool Workbench Tray (Grouping clickable brushes and colors) -->
      <div class="tool-tray">
        
        <!-- Section 1: Clicking select drawing tools -->
        <div class="tray-section">
          <span class="tray-section-title">Brushes</span>
          
          <!-- Round Brush (smooth lines) -->
          <div class="tool-container selected" id="tool-round-brush" data-tool="round" title="Round Paintbrush: Smooth, variable-weight strokes">
            <img src="/assets/img29.png" class="tool-img round-brush-tool" alt="Round Brush">
            <div class="selected-indicator"></div>
          </div>
          
          <!-- Flat Ribbon Brush (dynamic angled strokes) -->
          <div class="tool-container" id="tool-flat-brush" data-tool="flat" title="Flat Brush: Broad ribbon-like flat strokes">
            <img src="/assets/img18.png" class="tool-img flat-brush-tool" alt="Flat Brush">
            <div class="selected-indicator"></div>
          </div>
          
          <!-- Charcoal Carbon stick (grainy textured strokes) -->
          <div class="tool-container" id="tool-charcoal" data-tool="charcoal" title="Charcoal Stick: Textured, grainy carbon strokes">
            <img src="/assets/img21.png" class="tool-img charcoal-tool" alt="Charcoal Stick">
            <div class="selected-indicator"></div>
          </div>
        </div>

        <!-- Section 2: Paint tubes as quick swatches -->
        <div class="tray-section">
          <span class="tray-section-title">Quick Colors</span>
          <div class="tube-swatch-container">
            <div class="paint-tube-swatch tube-blue active" data-color="#1d4ed8" title="Ultramarine Blue">
              <img src="/assets/img09.png" alt="Blue paint tube">
            </div>
            <div class="paint-tube-swatch tube-red" data-color="#ff3c4d" title="Cadmium Red">
              <img src="/assets/img09.png" alt="Red paint tube">
            </div>
            <div class="paint-tube-swatch tube-yellow" data-color="#fbbf24" title="Chrome Yellow">
              <img src="/assets/img09.png" alt="Yellow paint tube">
            </div>
            <div class="paint-tube-swatch tube-green" data-color="#059669" title="Cobalt Green">
              <img src="/assets/img09.png" alt="Green paint tube">
            </div>
          </div>
        </div>

        <!-- Section 3: Interactive Color Palette picker and Custom Pot -->
        <div class="tray-section">
          <span class="tray-section-title">Color Palette</span>
          
          <div class="palette-picker-container" id="palette-picker">
            <img src="/assets/img28.png" class="palette-picker-img" alt="Wooden Color Palette">
            <!-- Interactive hotspots corresponding to blobs of paints on the image -->
            <div class="blob-hotspot" style="top: 30%; left: 32%; background: #ff3c4d;" data-color="#ff3c4d" title="Cadmium Red"></div>
            <div class="blob-hotspot" style="top: 24%; left: 52%; background: #fbbf24;" data-color="#fbbf24" title="Chrome Yellow"></div>
            <div class="blob-hotspot" style="top: 40%; left: 68%; background: #059669;" data-color="#059669" title="Cobalt Green"></div>
            <div class="blob-hotspot" style="top: 60%; left: 62%; background: #1d4ed8;" data-color="#1d4ed8" title="Ultramarine Blue"></div>
            <div class="blob-hotspot" style="top: 74%; left: 42%; background: #ffffff;" data-color="#ffffff" title="Titanium White"></div>
            <div class="blob-hotspot" style="top: 62%; left: 24%; background: #111827;" data-color="#111827" title="Lamp Black"></div>
          </div>

          <!-- Native color input styled as metal tint paint pot -->
          <div class="custom-color-pot">
            <div class="native-picker-wrapper">
              <input type="color" id="custom-color-picker" value="#1d4ed8" title="Custom color picker">
            </div>
            <span class="color-pot-label">Custom</span>
          </div>
        </div>

      </div>

    </div>

  </div>

  <script type="module" src="/classic.js"></script>
</body>
</html>
